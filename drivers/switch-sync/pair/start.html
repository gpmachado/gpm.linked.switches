<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      color: #333;
      padding: 24px;
    }

    h2 { font-size: 18px; margin-bottom: 20px; color: #111; }

    label.field-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #555;
    }

    input[type="text"], select {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 16px;
      background: #fff;
    }

    input[type="text"]:focus, select:focus {
      outline: none;
      border-color: #007aff;
    }

    .filter-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }

    .filter-row input[type="text"] { flex: 1; margin-bottom: 0; }
    .filter-row select             { flex: 1; margin-bottom: 0; }

    #device-list {
      border: 1px solid #ddd;
      border-radius: 8px;
      background: #fff;
      max-height: 260px;
      overflow-y: auto;
      margin-bottom: 8px;
      margin-top: 8px;
    }

    .device-item {
      display: flex;
      align-items: center;
      padding: 10px 14px;
      border-bottom: 1px solid #f0f0f0;
      cursor: pointer;
      transition: background 0.1s;
    }

    .device-item:last-child { border-bottom: none; }
    .device-item:hover { background: #f7f7f7; }
    .device-item.selected { background: #e8f0fe; }

    .device-item input[type="checkbox"] {
      margin-right: 10px;
      width: 16px;
      height: 16px;
      cursor: pointer;
      accent-color: #007aff;
    }

    .device-name { font-size: 14px; flex: 1; }
    .device-zone { font-size: 11px; color: #aaa; margin-left: 6px; }

    .hint { font-size: 12px; color: #999; margin-bottom: 8px; }

    #error-msg {
      color: #e53e3e;
      font-size: 13px;
      margin-bottom: 12px;
      display: none;
    }

    #loading {
      padding: 16px;
      font-size: 13px;
      color: #888;
      text-align: center;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #007aff;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      margin-top: 8px;
    }

    button:hover { background: #0062cc; }
    button:disabled { background: #aaa; cursor: default; }
  </style>
</head>
<body>

  <h2>Create Switch Sync Group</h2>

  <label class="field-label">Group Name</label>
  <input type="text" id="name" placeholder="e.g. Staircase" value="My Binding" />

  <label class="field-label">Devices to Sync</label>
  <p class="hint">Select at least 2 devices with ON/OFF capability.</p>

  <div class="filter-row">
    <input type="text" id="filter-text" placeholder="Search by name..." oninput="applyFilter()" />
    <select id="filter-zone" onchange="applyFilter()">
      <option value="">All zones</option>
    </select>
  </div>

  <div id="device-list">
    <div id="loading">Loading devices...</div>
  </div>

  <div id="error-msg"></div>

  <button id="btn-create" onclick="createBinding()" disabled>Create Binding Group</button>

  <script>
    var availableDevices = [];

    function showError(msg) {
      var el = document.getElementById('error-msg');
      el.textContent = msg;
      el.style.display = msg ? 'block' : 'none';
    }

    function buildZoneOptions(devices) {
      var seen = {};
      var zones = [];
      devices.forEach(function(d) {
        if (d.zoneId && d.zoneName && !seen[d.zoneId]) {
          seen[d.zoneId] = true;
          zones.push({ id: d.zoneId, name: d.zoneName });
        }
      });
      zones.sort(function(a, b) { return a.name.localeCompare(b.name); });

      var select = document.getElementById('filter-zone');
      zones.forEach(function(z) {
        var opt = document.createElement('option');
        opt.value = z.id;
        opt.textContent = z.name;
        select.appendChild(opt);
      });
    }

    function applyFilter() {
      var text = document.getElementById('filter-text').value.toLowerCase();
      var zoneId = document.getElementById('filter-zone').value;

      var filtered = availableDevices.filter(function(d) {
        var matchText = !text || d.name.toLowerCase().includes(text);
        var matchZone = !zoneId || d.zoneId === zoneId;
        return matchText && matchZone;
      });

      renderDevices(filtered);
    }

    function renderDevices(devices) {
      var list = document.getElementById('device-list');
      if (devices.length === 0) {
        list.innerHTML = '<div id="loading">No devices match the filter.</div>';
        return;
      }

      var checked = {};
      document.querySelectorAll('#device-list input[type=checkbox]:checked').forEach(function(cb) {
        checked[cb.value] = true;
      });

      list.innerHTML = devices.map(function(d) {
        var isChecked = checked[d.id] ? ' checked' : '';
        var isSelected = checked[d.id] ? ' selected' : '';
        var zoneBadge = d.zoneName ? '<span class="device-zone">' + d.zoneName + '</span>' : '';
        return '<label class="device-item' + isSelected + '" id="item-' + d.id + '">' +
          '<input type="checkbox" value="' + d.id + '"' + isChecked + ' onchange="onCheckChange(this)" />' +
          '<span class="device-name">' + d.name + '</span>' +
          zoneBadge +
          '</label>';
      }).join('');
    }

    function onCheckChange(checkbox) {
      var item = document.getElementById('item-' + checkbox.value);
      if (item) item.classList.toggle('selected', checkbox.checked);
    }

    function getSelectedIds() {
      return availableDevices
        .filter(function(d) {
          var cb = document.querySelector('#device-list input[value="' + d.id + '"]');
          return cb && cb.checked;
        })
        .map(function(d) { return d.id; });
    }

    function createBinding() {
      showError('');
      var name = document.getElementById('name').value.trim();
      var deviceIds = getSelectedIds();

      if (!name) { showError('Please enter a group name.'); return; }
      if (deviceIds.length < 2) { showError('Please select at least 2 devices.'); return; }

      document.getElementById('btn-create').disabled = true;

      Homey.emit('configure_binding', { name: name, deviceIds: deviceIds })
        .then(function() { Homey.nextView(); })
        .catch(function(err) {
          showError((err && err.message) || 'Error creating binding.');
          document.getElementById('btn-create').disabled = false;
        });
    }

    Homey.emit('get_available_devices', null)
      .then(function(devices) {
        availableDevices = devices || [];
        buildZoneOptions(availableDevices);
        renderDevices(availableDevices);
        document.getElementById('btn-create').disabled = false;
      })
      .catch(function() {
        document.getElementById('loading').textContent = 'Error loading devices.';
      });
  </script>

</body>
</html>
